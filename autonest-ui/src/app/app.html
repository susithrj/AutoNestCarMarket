<div class="min-h-screen bg-[#f8f9fb]">
  <app-toast />

  <header class="sticky top-0 z-20 border-b border-gray-200/70 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-screen-xl items-center gap-4 px-4 py-4 sm:px-6 lg:px-8">
      <div class="flex min-w-0 flex-1 items-center gap-6 lg:gap-10">
        <a class="flex shrink-0 items-center gap-3" routerLink="/">
          <span class="grid h-11 w-11 shrink-0 place-items-center rounded-xl bg-primary-light text-primary sm:h-12 sm:w-12">
            <span class="text-xl font-semibold sm:text-2xl">A</span>
          </span>
          <div class="text-2xl font-bold tracking-tight sm:text-3xl">
            <span class="text-primary">Auto</span><span class="text-gray-900">Nest</span>
          </div>
        </a>

        <nav class="hidden items-center gap-6 text-base font-semibold md:flex lg:gap-8">
          <a
            routerLink="/"
            class="inline-block border-b-[3px] pb-1 transition-colors hover:text-gray-700"
            [class.border-primary]="browseNavActive()"
            [class.text-primary]="browseNavActive()"
            [class.border-transparent]="!browseNavActive()"
            [class.text-gray-400]="!browseNavActive()"
          >
            Browse
          </a>
          <a
            *ngIf="role() === 'ADMIN'"
            routerLink="/admin"
            class="inline-block border-b-[3px] pb-1 transition-colors hover:text-gray-700"
            [class.border-primary]="sellNavActive()"
            [class.text-primary]="sellNavActive()"
            [class.border-transparent]="!sellNavActive()"
            [class.text-gray-400]="!sellNavActive()"
          >
            Sell
          </a>
        </nav>
      </div>

      <div class="flex shrink-0 items-center gap-2">
        <ng-container *ngIf="!isAuthenticated(); else authed">
          <a class="rounded-lg px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-100" routerLink="/login">
            Log in
          </a>
          <a class="rounded-lg bg-primary px-3 py-2 text-sm font-medium text-white hover:bg-primary/90" routerLink="/register">
            Sign up
          </a>
        </ng-container>

        <ng-template #authed>
          <div class="relative">
            <button
              type="button"
              class="flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-3 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50"
              (click)="userMenuOpen.set(!userMenuOpen())"
            >
              <span class="grid h-8 w-8 place-items-center rounded-full bg-primary-light text-sm font-semibold text-primary">
                {{ initials() }}
              </span>
              <span class="hidden max-w-[140px] truncate sm:block">{{ firstName() || 'Account' }}</span>
              <svg class="h-4 w-4 text-gray-400" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 0 1 1.06.02L10 10.94l3.71-3.71a.75.75 0 1 1 1.06 1.06l-4.24 4.25a.75.75 0 0 1-1.06 0L5.21 8.29a.75.75 0 0 1 .02-1.08Z" clip-rule="evenodd"/>
              </svg>
            </button>

            <div *ngIf="userMenuOpen()" class="absolute right-0 mt-2 w-56 overflow-hidden rounded-xl border border-gray-200 bg-white shadow-lg">
              <div class="px-4 py-3">
                <div class="text-xs font-medium text-gray-500">Signed in as</div>
                <div class="mt-0.5 truncate text-sm font-semibold text-gray-900">{{ email() }}</div>
              </div>
              <div class="border-t border-gray-100"></div>
              <a *ngIf="role() === 'ADMIN'" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-50" routerLink="/admin" (click)="userMenuOpen.set(false)">
                Admin dashboard
              </a>
              <button type="button" class="block w-full px-4 py-2 text-left text-sm text-gray-700 hover:bg-gray-50" (click)="logout()">
                Log out
              </button>
            </div>
          </div>
        </ng-template>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-screen-xl px-4 py-8 sm:px-6 lg:px-8">
    <router-outlet />
  </main>
</div>
